<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>SilicoByte Cart</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white">

  <!-- NAVBAR -->
  <nav class="bg-white/95 backdrop-blur-md border-b border-cyan-200 sticky top-0 z-50 shadow-lg p-4">

    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

      <div class="flex items-center gap-2">
        <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-cyan-600 rounded-lg flex items-center justify-center font-bold text-white animate-bounce" style="animation-delay: 0s;">S</div>
        <h1 class="text-3xl font-bold bg-gradient-to-r from-cyan-600 to-blue-600 bg-clip-text text-transparent hover:from-cyan-500 hover:to-blue-500 transition-all duration-300">SilicoByte</h1>
      </div>

      <div class="flex items-center gap-4">
        <button class="relative group">
          <span class="text-3xl transform group-hover:scale-110 group-hover:rotate-12 transition-all duration-300">🛒</span>
          <span 
            id="cart-count"
            class="absolute -top-2 -right-3 bg-gradient-to-r from-cyan-500 to-blue-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold animate-pulse">
            0
          </span>
        </button>
      </div>

    </div>

  </nav>

  <!-- HERO SECTION -->
 <div class="max-w-7xl mx-auto px-6 relative z-10 bg-white">

  <div class="grid grid-cols-1 md:grid-cols-2 items-center gap-10">

    <!-- LEFT CONTENT (your existing) -->
    <div class="flex flex-col items-start gap-6">
      <h1 class="text-4xl md:text-5xl font-bold text-gray-900 leading-tight max-w-3xl bg-gradient-to-r from-cyan-500 to-blue-600 bg-clip-text text-transparent">
        Premium Tech
        <span class="block bg-gradient-to-r from-cyan-500 to-blue-600 bg-clip-text text-transparent">
          Redefined
        </span>
      </h1>

      <p class="text-lg  max-w-xl leading-relaxed font-medium  bg-gradient-to-r from-cyan-500 to-blue-600 bg-clip-text text-transparent">
        Discover cutting-edge gadgets curated for excellence. Seamless shopping, stunning design.
      </p>

      <button class="px-8 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-semibold rounded-lg hover:shadow-lg">
        Explore Now
      </button>
    </div>

    <!-- RIGHT PRODUCT ROTATOR -->
    <div class="relative flex justify-center items-center">
      
      <div id="hero-product" class="hero-product-card">
        <img id="hero-img" src="" class="w-64 h-64 object-contain  transition-all duration-700">
        <h3 id="hero-title" class="text-xl font-semibold text-gray-900 mt-4 text-center"></h3>
      </div>

    </div>

  </div>

</div>

  <!-- SEARCH + FILTERS -->
  <section class="max-w-7xl mx-auto px-6 py-8 bg-gradient-to-r from-blue-600 to-cyan-500">

    <div class="flex flex-col gap-5">
      <!-- SEARCH -->
      <div class="relative group">
        <input
          type="text"
          id="search-input"
          placeholder="Search products..."
          class="w-full md:w-96 px-6 py-3 rounded-lg bg-white border-2 border-gray-200 text-gray-900 placeholder-gray-400 outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-200 transition-all duration-300 group-hover:border-cyan-300"
        >
        <div class="absolute right-4 top-3 text-gray-400 group-hover:text-cyan-500 transition-colors">🔍</div>
      </div>

      <select
        id="sort-select"
        class="px-6 py-3 rounded-lg bg-white border-2 border-gray-200 text-gray-900 outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-200 transition-all duration-300 hover:border-cyan-300 w-fit cursor-pointer">

        <option value="default" class="bg-white text-gray-900">Sort By</option>

        <option value="low-high" class="bg-white text-gray-900">
          Price Low → High
        </option>

        <option value="high-low" class="bg-white text-gray-900">
          Price High → Low
        </option>

      </select>

      <!-- CATEGORY FILTER -->
      <div class="flex gap-3 flex-wrap">

        <button class="filter-btn bg-gradient-to-r from-cyan-500 to-blue-600 text-white px-6 py-2 rounded-lg font-semibold shadow-md hover:shadow-lg hover:from-cyan-600 hover:to-blue-700 transform hover:-translate-y-1 transition-all duration-300" data-category="All">
          All
        </button>

        <button class="filter-btn bg-white border-2 border-gray-300 text-gray-700 px-6 py-2 rounded-lg font-medium transition-all duration-300 hover:border-cyan-500 hover:text-cyan-600 hover:shadow-md transform hover:-translate-y-1" data-category="Audio">
          Audio
        </button>

        <button class="filter-btn bg-white border-2 border-gray-300 text-gray-700 px-6 py-2 rounded-lg font-medium transition-all duration-300 hover:border-blue-500 hover:text-blue-600 hover:shadow-md transform hover:-translate-y-1" data-category="Wearable">
          Wearable
        </button>

        <button class="filter-btn bg-white border-2 border-gray-300 text-gray-700 px-6 py-2 rounded-lg font-medium transition-all duration-300 hover:border-purple-500 hover:text-purple-600 hover:shadow-md transform hover:-translate-y-1" data-category="Gaming">
          Gaming
        </button>
        <button class="filter-btn bg-white border-2 border-gray-300 text-gray-700 px-6 py-2 rounded-lg font-medium transition-all duration-300 hover:border-purple-500 hover:text-purple-600 hover:shadow-md transform hover:-translate-y-1" data-category="Camera">
          Camera
        </button>
        <button class="filter-btn bg-white border-2 border-gray-300 text-gray-700 px-6 py-2 rounded-lg font-medium transition-all duration-300 hover:border-purple-500 hover:text-purple-600 hover:shadow-md transform hover:-translate-y-1" data-category="Accessories">
          Accessories
        </button>

      </div>

    </div>

  </section>

  <!-- MAIN LAYOUT -->
  <div class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8 bg-gradient-to-b from-white to-blue-50 min-h-screen">

    <!-- PRODUCTS -->
    <div class="lg:col-span-2">

      <h2 class="text-4xl font-bold mb-8 text-gray-900 hover:bg-gradient-to-r hover:from-cyan-600 hover:to-blue-600 hover:bg-clip-text hover:text-transparent transition-all duration-300">
        Featured Collection
      </h2>

      <div 
        id="product-container"
        class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">

      </div>

    </div>

    <!-- CART -->
    <div class="bg-white border-2 border-cyan-200 rounded-2xl p-6 h-fit sticky top-28 shadow-lg hover:shadow-2xl hover:border-cyan-400 transition-all duration-300">

      <h2 class="text-2xl font-bold mb-5 bg-gradient-to-r from-cyan-600 to-blue-600 bg-clip-text text-transparent">
        Shopping Cart
      </h2>

      <div id="cart-container" class="space-y-4">

      </div>

      <div class="border-t-2 border-cyan-200 mt-5 pt-5">

        <h3 
          id="total-price"
          class="text-2xl font-bold bg-gradient-to-r from-cyan-600 to-blue-600 bg-clip-text text-transparent">

          Total: Rs. 0

        </h3>

      </div>

    </div>

  </div>

<script type="module" src="./js/app.js"></script>
<script type="module" src="./js/animations.js"></script>

</body>
</html>
